{% extends 'base.html' %}

{% block title %}Page Not Found (404) | {{ socials.site_name or 'Portfolio' }}{% endblock %}

{% block content %}
<section class="section-padding d-flex align-items-center justify-content-center" style="min-height: 90vh; margin-top: 50px;">
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5">
                <div class="glass-card py-5 reveal">
                    <h1 class="font-outfit display-1 fw-extrabold mb-3" style="background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px var(--accent-glow));">404</h1>
                    <h3 class="mb-4">Lost in Space?</h3>
                    <p class="text-secondary mb-5">
                        The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
                    </p>
                    <a href="{{ url_for('main.index') }}" class="btn-premium py-3 px-5">
                        <i class="fas fa-home me-2"></i>Go Back Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
